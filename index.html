<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wholesale Menu</title>
  <style>
    :root {
      --bg: #111827;
      --panel: #18212f;
      --panel-2: #1f2937;
      --text: #f9fafb;
      --muted: #cbd5e1;
      --accent: #22c55e;
      --accent-2: #86efac;
      --line: rgba(255,255,255,0.08);
      --shadow: 0 18px 40px rgba(0,0,0,0.35);
      --glow: 0 0 0 1px rgba(134,239,172,0.08), 0 0 30px rgba(34,197,94,0.08);
      --radius: 22px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(34,197,94,0.10), transparent 22%),
        radial-gradient(circle at top right, rgba(34,197,94,0.08), transparent 18%),
        linear-gradient(180deg, #0b1220 0%, #111827 100%);
      color: var(--text);
    }

    .board {
      max-width: 1600px;
      margin: 0 auto;
      padding: 18px;
    }

    .topbar {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 18px;
      margin-bottom: 18px;
    }

    .brand,
    .promo,
    .menu-panel,
    .bottom-note {
      background: linear-gradient(180deg, rgba(31,41,55,0.96), rgba(24,33,47,0.98));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow), var(--glow);
    }

    .brand {
      padding: 28px 30px;
      position: relative;
      overflow: hidden;
    }

    .brand::after {
      content: "";
      position: absolute;
      right: -40px;
      top: -40px;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(134,239,172,0.18), transparent 65%);
    }

    .eyebrow {
      padding: 7px 12px;
      border-radius: 999px;
      background: rgba(34,197,94,0.12);
      color: var(--accent-2);
      font-size: 0.8rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 14px;
      display: inline-block;
    }

    .title {
      margin: 0;
      font-size: clamp(2.2rem, 4.2vw, 4.8rem);
      text-transform: uppercase;
    }

    .subtitle {
      margin-top: 12px;
      color: var(--muted);
    }

    .promo {
      min-height: 250px;
      position: relative;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(0,0,0,0.1), rgba(0,0,0,0.5)),
        url('https://images.unsplash.com/photo-1556740749-887f6717d7e4?auto=format&fit=crop&w=1400&q=80') center/cover no-repeat;
    }

    .promo-copy {
      position: absolute;
      bottom: 20px;
      left: 20px;
      right: 20px;
      color: white;
    }

    .menu-panel { padding: 18px; }

    .menu-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 0.9fr;
      gap: 18px;
    }

    .column { display: grid; gap: 18px; }

    .category {
      border: 1px solid var(--line);
      border-radius: 18px;
      overflow: hidden;
    }

    .category-head {
      padding: 16px;
      background: rgba(34,197,94,0.08);
    }

    .category-title {
      margin: 0;
      color: var(--accent-2);
      text-transform: uppercase;
    }

    .items { padding: 10px 16px; }

    .item {
      padding: 14px 0;
      border-bottom: 1px solid var(--line);
    }

    .item.out-of-stock-item {
      opacity: 0.5;
      filter: saturate(0.8);
    }

    .item:last-child { border-bottom: none; }

    /* 🔥 UPDATED IMAGE STYLES */

    .item-image-wrap {
      margin-bottom: 10px;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.07);
      background: #0f172a;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .item-image {
      width: 100%;
      height: 180px;
      object-fit: contain;
      background: #0f172a;
    }

    .feature-image-wrap {
      margin-bottom: 14px;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.08);
      background: #0f172a;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .feature-image {
      width: 100%;
      height: 260px;
      object-fit: contain;
      background: #0f172a;
    }

    .item-top {
      display: flex;
      justify-content: space-between;
    }

    .price {
      color: var(--accent-2);
      font-weight: bold;
    }

    .meta {
      display: flex;
      gap: 8px;
      margin-top: 8px;
      flex-wrap: wrap;
    }

    .badge, .stock-badge {
      padding: 4px 9px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: bold;
    }

    .stock-badge.out-of-stock {
      background: rgba(239,68,68,0.2);
      color: #fca5a5;
    }

    .stock-badge.in-stock {
      background: rgba(34,197,94,0.2);
      color: #86efac;
    }

    .stock-badge.low-stock {
      background: rgba(250,204,21,0.2);
      color: #fde68a;
    }

  </style>
</head>
<body>

<div class="board">
  <section class="menu-panel">
    <main id="menu" class="menu-grid"></main>
  </section>
</div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSY4gWBxaMlsabshPp36natpLQfSt-LygQjGdsXgztok_J5w1dg3efZAyP2pqbYy-9ktNZi_1DW5PsF/pub?gid=0&single=true&output=csv";

const menuEl = document.getElementById("menu");

function getStockNumber(qty) {
  const num = Number(qty);
  return isNaN(num) ? null : num;
}

function getStockBadge(qty) {
  const n = getStockNumber(qty);

  if (n === null) return "";

  if (n <= 0) return `<span class="stock-badge out-of-stock">Out of Stock</span>`;
  if (n <= 5) return `<span class="stock-badge low-stock">Low Stock</span>`;

  return `<span class="stock-badge in-stock">In Stock</span>`;
}

function createImage(src) {
  if (!src) return "";
  return `
    <div class="item-image-wrap">
      <img src="${src}" class="item-image">
    </div>
  `;
}

function render(data) {
  const grouped = {};

  data.forEach(row => {
    if (!grouped[row.category]) grouped[row.category] = [];
    grouped[row.category].push(row);
  });

  menuEl.innerHTML = "";

  const left = document.createElement("div");
  const mid = document.createElement("div");

  left.className = "column";
  mid.className = "column";

  Object.keys(grouped).forEach((cat, i) => {
    const section = document.createElement("div");
    section.className = "category";

    section.innerHTML = `<div class="category-head"><h2 class="category-title">${cat}</h2></div>`;

    const wrap = document.createElement("div");
    wrap.className = "items";

    grouped[cat]
      .sort((a, b) => {
        const aOut = getStockNumber(a["qty in stock"]) <= 0 ? 1 : 0;
        const bOut = getStockNumber(b["qty in stock"]) <= 0 ? 1 : 0;
        return aOut - bOut;
      })
      .forEach(item => {

        const out = getStockNumber(item["qty in stock"]) <= 0;

        const el = document.createElement("div");
        el.className = `item ${out ? "out-of-stock-item" : ""}`;

        el.innerHTML = `
          ${createImage(item.image)}
          <div class="item-top">
            <div>${item.item}</div>
            <div class="price">$${item.price}</div>
          </div>
          <div class="meta">
            ${getStockBadge(item["qty in stock"])}
          </div>
        `;

        wrap.appendChild(el);
      });

    section.appendChild(wrap);
    (i % 2 === 0 ? left : mid).appendChild(section);
  });

  menuEl.appendChild(left);
  menuEl.appendChild(mid);
}

fetch(CSV_URL)
  .then(r => r.text())
  .then(text => {
    const rows = text.split("\n").slice(1).map(r => r.split(","));
    const data = rows.map(r => ({
      category: r[0],
      item: r[1],
      price: r[3],
      image: r[7],
      "qty in stock": r[8]
    }));
    render(data);
  });
</script>

</body>
</html>
